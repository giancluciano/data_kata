services:

  # ── Kafka (KRaft — no ZooKeeper) ──────────────────────────────────────────
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9094:9094"   # external: host → kafka  (matches application.conf default)
    environment:
      # KRaft identity
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Listeners
      #  PLAINTEXT  – container-to-container (ingestion service → kafka)
      #  CONTROLLER – KRaft internal
      #  EXTERNAL   – host machine access (kafka-ui, local dev tools)
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── Kafka UI ───────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  # ── Ingestion service ──────────────────────────────────────────────────────
  ingestion:
    build:
      context: src/ingestion
      dockerfile: ../../docker/ingestion/Dockerfile
    container_name: ingestion
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SALES_CSV_PATH: /data/sales.csv
      SALES_TOPIC: sales-raw
    volumes:
      - ./src/sources/filesystem:/data:ro
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure

volumes:
  kafka_data:
